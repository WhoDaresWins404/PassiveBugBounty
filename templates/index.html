<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bug Bounty Scaner - Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-12">

<div id="app" class="max-w-4xl mx-auto bg-gray-800 rounded-lg p-8 shadow-2xl border border-gray-700">
    <h1 class="text-3xl font-bold mb-6 border-b pb-2 text-blue-500">Passive Scan Dashboard</h1>

    <div class="mb-8 bg-gray-900 p-4 rounded-md">
        <p id="status_msg" class="mb-2 font-semibold text-yellow-400">Waiting for scan...</p>
        <div class="w-full bg-gray-700 h-6 rounded overflow-hidden">
            <progress id="progress_bar" value="0" max="100" class="h-full w-[25%]"></progress>
        </div>
    </div>

    <div id="results_container" hidden>
        <p id="results_msg" class="mb-4 text-green-400 font-semibold">Scan complete. Findings below:</p>
        <table class="w-full border-collapse bg-gray-900 rounded overflow-hidden">
            <thead>
                <tr>
                    <th class="border p-3">Severity</th>
                    <th>Details</th>
                </tr>
            </thead>
            <tbody id="findings_list"></tbody>
        </table>
    </div>

    <div id="no_results" hidden>No findings reported during this scan.</div>
</div>

<script>
const statusEl = document.getElementById('status_msg');
 const progressEl = document.getElementById('progress_bar');
 const resultsContainer = document.getElementById('results_container');
 const noResults = document.getElementById('no_results');
 const findingsList = document.getElementById('findings_list');

 async function updateStatus() {
     try {
         const response = await fetch('/status');
         if (response.ok) {
             const data = await response.json();
             progressEl.value = data.progress;
             statusEl.innerText = `Scan Progress: ${data.progress}% — ${data.message}`;

             // If done, fetch full results automatically
             if(data.progress === 100) {
                 fetchResults();
             }
         }
     } catch (err) {}
 }

 async function fetchResults() {
    try {
        const response = await fetch('/results');
        const data = await response.json();

        if(data.error){
            statusEl.innerText ="Error fetching results";
            return;
        }

        noResults.hidden = false;
        resultsContainer.hidden = true;
        findingsList.innerHTML ='';

        if (data.findings && data.findings.length > 0) {
           noResults.hidden=true
           data.findings.forEach(finding=>
            {
                const tr=(severity===’High’)?”<td class=”bg-red-950 border p-3”]”:”<td class=”border p-3”>";
                findingsList.innerHTML+=`${tr}${finding.severity}</tr><tr><td class=”border p-3”>${finding.details}</td></tr>`;
            });
        }

    } catch (e){}
 }

 setInterval(updateStatus, 2000);
</script>
</body>
</html>
