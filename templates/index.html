<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Passive Bug Bounty Scanner</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        #progress-container { max-width: 600px; margin: auto; }
    </style>
</head>
<body>
    <nav class="navbar navbar-dark bg-dark mb-4">
        <span class="navbar-brand mb-0">BugBounty Scanner</span>
    </nav>

    <div id="progress-container" class="bg-white p-5 rounded shadow-sm mt-lg-5 text-center">
        <h3>Active Scan Progress</h3>
        <p class="text-muted">Retrieving mock status from backend...</p>
        <div class="progress mb-3">
            <div id="scan-progress" class="progress-bar bg-info" style="width: 45%"></div>
        </div>
        <h2 id="status-percent">45%</h2>

        <hr>
        <h4>Finding Overview</h4>
        <table class="table table-hover mt-3">
            <thead><tr><th>ID</th><th>Severity</th><th>Details</th></tr></thead>
            <tbody>
                <tr><td>#1</td><td class="text-danger font-weight-bold">High</td><td>Sample bug description (mock)</td></tr>
            </tbody>
        </table>

        <div id="log" class="mt-4 small text-success">Listening for updates... </div>
    </div>
</body>
</html>
